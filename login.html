<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | ElectroCorp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
<p class="auth-back"><a href="index.html"><i class="fa fa-arrow-left"></i> Volver al inicio</a></p>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="brand">
            <a href="index.html"><img src="img/logo.png" alt="Logo UPC" width="120" height="60"></a>
        </div>
        <h1>Iniciar sesión</h1>
        <p class="sub">Accede a tu cuenta ElectroCorp</p>
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="tu@correo.com" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="off">
        </div>
        <a href="dashboard.html" class="btn btn-full">Iniciar sesión</a>
        <p class="auth-footer">¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
    </div>
</div>
</body>
</html>
